<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Registro | MiniStock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../style/global.css">
    <link rel="stylesheet" href="../../style/auth.css">
    <script src="../../script/config.js"></script>
    <script src="../../script/auth/auth.js"></script>
</head>
<body>
    <nav class="ms-navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="../../index.html" class="navbar-brand">MiniStock</a>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>
    </nav>

    <main class="ms-auth-container">
        <div class="ms-auth-card">
            <a href="../../index.html" class="text-decoration-none mb-4 d-inline-flex align-items-center gap-2" style="color: var(--text-sub); font-size: 0.9rem;">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>

            <div class="text-center mb-4">
                <h3 class="fw-bold">Crie sua conta</h3>
                <p style="color: var(--text-sub)">Comece a gerenciar seu estoque hoje</p>
            </div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="ms-label">Nome Completo</label>
                    <input type="text" id="nome" class="form-control ms-input" placeholder="Seu nome" required>
                </div>

                <div class="mb-3">
                    <label class="ms-label">E-mail</label>
                    <input type="email" id="email" class="form-control ms-input" placeholder="seu@email.com" required>
                </div>

                <div class="mb-4">
                    <label class="ms-label">Senha</label>
                    <input type="password" id="senha" class="form-control ms-input" placeholder="••••••••" required>
                </div>

                <button type="submit" id="btnRegister" class="ms-btn ms-btn-primary w-100">
                    Finalizar Cadastro
                </button>
            </form>
            
            <p class="text-center mt-4 mb-0" style="color: var(--text-sub); font-size: 0.95rem;">
                Já tem conta? <a href="./login.html" class="fw-bold" style="color: var(--accent); text-decoration: none;">Fazer login</a>
            </p>
        </div>
    </main>

    <script src="../../script/theme.js"></script>
    <script src="../../script/auth/register.js"></script>
</body>
</html>
