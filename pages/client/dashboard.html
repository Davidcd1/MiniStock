<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | MiniStock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../style/global.css">
    <link rel="stylesheet" href="../../style/dashboard.css">
    <script src="../../script/config.js"></script>
    <script src="../../script/auth/auth.js"></script>
</head>
<body>

<div class="app">
    <header class="topbar">
        <div class="d-flex align-items-center gap-2 gap-sm-3">
            <span class="logo">MS</span> 
            <span class="logo d-none d-sm-inline">MiniStock</span>
            <button id="theme-toggle" class="theme-toggle">🌙</button>
        </div>
        <div class="d-flex align-items-center gap-2 gap-sm-3">
            <span class="user-name d-none d-md-inline" id="user-display">Minha Loja</span>
            <button class="ms-btn ms-btn-outline btn-sm-icon" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
                <span class="d-none d-sm-inline">Sair</span>
            </button>
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-links w-100">
                <button class="nav-btn active" data-page="visao-geral">
                    <i class="bi bi-grid-1x2-fill"></i> 
                    <span>Visão Geral</span>
                </button>
                <button class="nav-btn" data-page="produtos">
                    <i class="bi bi-box-seam"></i> 
                    <span>Produtos</span>
                </button>
            </div>
            
            <div class="mt-auto border-top pt-3 d-none d-md-block sidebar-footer">
                <p class="text-muted">MiniStock v1.0</p>
            </div>
        </aside>

        <main class="content">
            <div class="container-fluid p-0">
                <div id="conteudo-dinamico">
                    </div>
            </div>
        </main>
    </div>
</div>

<script src="../../script/theme.js"></script>
<script src="../../script/client/dashboard.js"></script>
<script src="../../script/client/produtos/exibirprodutos.js"></script>
<script src="../../script/client/produtos/novoproduto.js"></script>
<script src="../../script/client/produtos/excluirproduto.js"></script>
<script src="../../script/client/produtos/editarproduto.js"></script>

<script>
    function logout() {
        localStorage.clear();
        window.location.href = "../auth/login.html";
    }
    
    const userName = localStorage.getItem("nome");
    if (userName) {
        document.getElementById("user-display").innerText = userName;
    }
</script>

</body>
</html>
